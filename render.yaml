# Render Blueprint — MediaSphere
# Docs: https://render.com/docs/blueprint-spec
#
# You need TWO services:
#   1. mediasphere-api (Web) — dashboard API
#   2. mediasphere-pipeline (Background Worker) — Lokal + YouTube every hour + emails
#
# Set secrets in Render Dashboard → Environment (not in this file).

services:
  - type: web
    name: mediasphere-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --timeout 120 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_DEBUG
        value: false
      - key: EMAIL_ENABLED
        value: false
      - key: REPORT_SCHEDULER_ON_API
        value: false
      - key: REPORT_CATCHUP_ON_START
        value: false

  - type: worker
    name: mediasphere-pipeline
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    # Runs Lokal + YouTube every hour; sends one email per new article
    startCommand: python run_all_pipelines.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIPELINE_INTERVAL_HOURS
        value: "1"
      - key: YOUTUBE_ENABLED
        value: true
      - key: EMAIL_ENABLED
        value: false
