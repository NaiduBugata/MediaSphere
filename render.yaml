# Render Blueprint — MediaSphere
# Docs: https://render.com/docs/blueprint-spec
#
# Render's FREE tier does NOT support background workers (they require a paid
# instance). So the news pipeline runs INSIDE the free web service via an
# in-process scheduler (PIPELINE_ON_API=true) instead of a separate worker.
#
# The web service:
#   - Serves the dashboard API
#   - Runs the Lokal + YouTube + Sakshi pipeline every PIPELINE_INTERVAL_HOURS while awake
#   - Runs one catch-up cycle on startup (collects anything published while asleep)
#
# gunicorn MUST stay at --workers 1 so only ONE pipeline scheduler exists.
# Free web services sleep after ~15 min idle; the dashboard's 5-min polling
# keeps an open tab awake, and a cold wake triggers the catch-up run.
#
# Set secrets (Mongo URI, GROQ keys, etc.) in Render Dashboard → Environment.

services:
  - type: web
    name: mediasphere-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --timeout 120 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_DEBUG
        value: false
      # Run the news pipeline in-process (no separate worker on free tier).
      - key: PIPELINE_ON_API
        value: true
      - key: PIPELINE_CATCHUP_ON_START
        value: true
      - key: PIPELINE_INTERVAL_HOURS
        value: "1"
      # Keep gunicorn --workers 1. Mongo pipeline_lock prevents double runs if misconfigured,
      # but single worker remains required on Render Free.
      # Optional secrets (Dashboard only): PIPELINE_ADMIN_TOKEN, PIPELINE_LOCK_TTL_SECONDS
      - key: YOUTUBE_ENABLED
        value: true
      - key: SAKSHI_ENABLED
        value: true
      - key: SAKSHI_TAG_URL
        value: https://www.sakshi.com/tags/narasaraopet
      - key: SAKSHI_REQUEST_DELAY_SECONDS
        value: "1.5"
      - key: SAKSHI_MAX_ARTICLES_PER_RUN
        value: "20"
      # Incremental alerts + daily 07:00 IST digest via Resend (SMTP blocked on free tier).
      # Set secrets in Dashboard: RESEND_API_KEY, REPORT_RECIPIENTS, SMTP_FROM_EMAIL (verified domain/sender).
      - key: EMAIL_ENABLED
        value: true
      - key: EMAIL_PROVIDER
        value: resend
      - key: REPORT_SCHEDULER_ON_API
        value: true
      - key: REPORT_CATCHUP_ON_START
        value: false
      - key: REPORT_CONSTITUENCY
        value: Narasaraopet
      # WhatsApp Cloud API webhook (secrets set in Render Dashboard only).
      - key: WHATSAPP_WEBHOOK_ENABLED
        value: true
      # Required secrets (add manually in Render Dashboard, do NOT commit):
      # WHATSAPP_VERIFY_TOKEN, WHATSAPP_ACCESS_TOKEN,
      # WHATSAPP_PHONE_NUMBER_ID, WHATSAPP_WABA_ID
